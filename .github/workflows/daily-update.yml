name: Daily trending update

# 每天 00:23 UTC（北京时间 08:23）自动抓取 github.com/trending 并刷新 data.json / data.js。
# 数据无变化时不产生提交；推送后 GitHub Pages 自动重新发布。
# 也可在 Actions 页面手动触发（workflow_dispatch）。

on:
  schedule:
    - cron: "23 0 * * *"
  workflow_dispatch:
    inputs:
      llm_limit:
        description: "本轮 LLM 精评上限（留空则用默认 25；可用 vars.LLM_LIMIT 全局覆盖）"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-trending-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run regression tests
        run: python3 -m unittest discover -s tests -v

      - name: Fetch trending and refresh data
        run: python3 scripts/update.py
        env:
          # 可选 LLM 精评：在仓库 Settings → Secrets and variables 配置
          # LLM_API_KEY / LLM_BASE_URL（secrets）与 LLM_MODEL（variables）后启用；
          # 未配置时以下变量为空字符串，脚本自动保持「自动摘要」降级。
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_PROTOCOL: ${{ vars.LLM_PROTOCOL }}
          LLM_LIMIT: ${{ github.event.inputs.llm_limit || vars.LLM_LIMIT }}

      - name: Commit data if changed
        run: |
          git config user.name "trending-scope-bot"
          git config user.email "trending-scope-bot@users.noreply.github.com"
          git add data.json data.js archive/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            update_date="$(python3 -c 'import json; print(json.load(open("data.json"))["meta"]["date"])')"
            git commit -m "chore(data): daily trending update ${update_date}"
            git push
          fi

      - name: Prepare Cloudflare Pages bundle if configured
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          mkdir -p dist
          cp index.html index-en.html data.json data.js favicon.png og-zh.png og-en.png dist/
          cp -R archive videos dist/

      - name: Publish Cloudflare Pages bundle
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=trending-scope --branch=main
